syntax = "proto3";

package projects;

service ProjectsService {
  rpc CreateProject (CreateProjectRequest) returns (ProjectResponse);
  rpc GetMyProjects (GetMyProjectsRequest) returns (ProjectListResponse);
  rpc GetMyProjectsPaginated (GetMyProjectsPaginatedRequest) returns (ProjectsConnectionResponse);
  rpc GetCompanyProjects (IdRequest) returns (ProjectListResponse);
  rpc GetProjectMembers (IdRequest) returns (ProjectMemberListResponse);
  rpc AddProjectMember (AddProjectMemberRequest) returns (ProjectMemberResponse);
  rpc RemoveProjectMember (RemoveProjectMemberRequest) returns (BoolResponse);
  rpc GetProject (IdRequest) returns (ProjectResponse);
  rpc UpdateProjectStatus (UpdateProjectStatusRequest) returns (ProjectResponse);
  rpc UpdateProject (UpdateProjectRequest) returns (ProjectResponse);
  rpc AddProjectFile (AddProjectFileRequest) returns (ProjectFileResponse);
  rpc RemoveProjectFile (RemoveProjectFileRequest) returns (BoolResponse);
  rpc GetProjectFiles (IdRequest) returns (ProjectFileListResponse);
  rpc GetProjectFilesBatch (ProjectIdsRequest) returns (ProjectFileListResponse);
  rpc AddProjectLink (AddProjectLinkRequest) returns (ProjectLinkResponse);
  rpc RemoveProjectLink (RemoveProjectLinkRequest) returns (BoolResponse);
  rpc GetProjectLinks (IdRequest) returns (ProjectLinkListResponse);
  rpc GetProjectLinksBatch (ProjectIdsRequest) returns (ProjectLinkListResponse);
}

message IdRequest {
  string id = 1;
}

message ProjectIdsRequest {
  repeated string projectIds = 1;
}

message GetMyProjectsRequest {
  string companyId = 1;
  string employeeId = 2;
}

message CreateProjectRequest {
  string companyId = 1;
  string creatorEmployeeId = 2;
  string name = 3;
  string starts = 4;
  string deadline = 5;
  string priority = 6;
  string description = 7;
  string image = 8;
  string reporterId = 9;
  repeated string assigneeIds = 10;
}

message UpdateProjectStatusRequest {
  string id = 1;
  string status = 2;
  string actorEmployeeId = 3;
}

message UpdateProjectRequest {
  string id = 1;
  string name = 2;
  string starts = 3;
  string deadline = 4;
  string priority = 5;
  string description = 6;
  string image = 7;
  string actorEmployeeId = 8;
  string reporterId = 9;
  repeated string assigneeIds = 10;
  bool updateAssignees = 11;
  bool updateReporter = 12;
}

message ProjectResponse {
  string id = 1;
  string companyId = 2;
  string name = 3;
  string slug = 4;
  string status = 5;
  string starts = 6;
  string deadline = 7;
  string priority = 8;
  string description = 9;
  string image = 10;
  string createdAt = 11;
  string updatedAt = 12;
}

message ProjectMemberResponse {
  string id = 1;
  string projectId = 2;
  string employeeId = 3;
  string role = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message ProjectListResponse {
  repeated ProjectResponse projects = 1;
}

message ProjectFilterRequest {
  string name = 1;
  string slug = 2;
  repeated string priority = 3;
  repeated string status = 4;
  repeated string reporterIds = 5;
  repeated string assigneeIds = 6;
  string startsFrom = 7;
  string startsTo = 8;
  string deadlineFrom = 9;
  string deadlineTo = 10;
}

message GetMyProjectsPaginatedRequest {
  string companyId = 1;
  string employeeId = 2;
  int32 first = 3;
  string after = 4;
  ProjectFilterRequest filter = 5;
}

message PageInfoResponse {
  bool hasNextPage = 1;
  string endCursor = 2;
}

message ProjectEdgeResponse {
  ProjectResponse node = 1;
  string cursor = 2;
}

message ProjectsConnectionResponse {
  repeated ProjectEdgeResponse edges = 1;
  PageInfoResponse pageInfo = 2;
  int32 totalCount = 3;
}

message AddProjectMemberRequest {
  string projectId = 1;
  string employeeId = 2;
  string role = 3;
  string actorEmployeeId = 4;
}

message RemoveProjectMemberRequest {
  string id = 1;
  string actorEmployeeId = 2;
}

message ProjectMemberListResponse {
  repeated ProjectMemberResponse members = 1;
}

message BoolResponse {
  bool value = 1;
}

message AddProjectFileRequest {
  string projectId = 1;
  string url = 2;
  string name = 3;
  string mimeType = 4;
  int32 size = 5;
  string actorEmployeeId = 6;
}

message RemoveProjectFileRequest {
  string id = 1;
  string actorEmployeeId = 2;
}

message ProjectFileResponse {
  string id = 1;
  string projectId = 2;
  string url = 3;
  string name = 4;
  string mimeType = 5;
  int32 size = 6;
  string createdAt = 7;
  string updatedAt = 8;
}

message ProjectFileListResponse {
  repeated ProjectFileResponse files = 1;
}

message AddProjectLinkRequest {
  string projectId = 1;
  string url = 2;
  string title = 3;
  string actorEmployeeId = 4;
}

message RemoveProjectLinkRequest {
  string id = 1;
  string actorEmployeeId = 2;
}

message ProjectLinkResponse {
  string id = 1;
  string projectId = 2;
  string url = 3;
  string title = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message ProjectLinkListResponse {
  repeated ProjectLinkResponse links = 1;
}
