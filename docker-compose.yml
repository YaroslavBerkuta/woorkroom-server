services:
  db:
    image: postgres:16-alpine
    container_name: woorkroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: woorkroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - woorkroom-net

  redis:
    image: redis:7-alpine
    container_name: woorkroom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - woorkroom-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: woorkroom-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - woorkroom-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: woorkroom-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: woorkroom
      RABBITMQ_DEFAULT_PASS: woorkroom
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - woorkroom-net

  users:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-users
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: docker
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
      GRPC_USERS_PORT: "5001"
    ports:
      - "5001:5001"
    command: ["npx", "nest", "start", "users", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - woorkroom-net

  companys:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-companys
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: docker
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
      GRPC_COMPANYS_PORT: "5003"
    ports:
      - "5003:5003"
    command: ["npx", "nest", "start", "companys", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - woorkroom-net

  authorization:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-authorization
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: docker
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
      GRPC_AUTH_PORT: "5002"
      GRPC_USERS_URL: "users:5001"
      GRPC_COMPANYS_URL: "companys:5003"
    ports:
      - "5002:5002"
    command: ["npx", "nest", "start", "authorization", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
      - redis
      - users
      - companys
    networks:
      - woorkroom-net

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: docker
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
      GRPC_USERS_URL: "users:5001"
      GRPC_AUTH_URL: "authorization:5002"
      GRPC_COMPANYS_URL: "companys:5003"
      GRPC_MEDIA_URL: "media:5004"
      GRPC_PROJECTS_URL: "projects:5005"
    command: ["npx", "nest", "start", "gateway", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - users
      - authorization
      - companys
      - projects
    networks:
      - woorkroom-net

  mails:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-mails
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: docker
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
    command: ["npx", "nest", "start", "mails", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - rabbitmq
      - mailpit
    networks:
      - woorkroom-net

  minio:
    image: minio/minio:latest
    container_name: woorkroom-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: woorkroom
      MINIO_ROOT_PASSWORD: woorkroom
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - woorkroom-net

  media:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-media
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: docker
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
      GRPC_MEDIA_PORT: "5004"
      MEDIA_HTTP_PORT: "3001"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "woorkroom"
      MINIO_SECRET_KEY: "woorkroom"
      MINIO_BUCKET: "woorkroom-media"
      MINIO_PUBLIC_URL: "http://localhost:9000"
    ports:
      - "3001:3001"
      - "5004:5004"
    command: ["npx", "nest", "start", "media", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - minio
    networks:
      - woorkroom-net

  projects:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-projects
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: docker
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
      GRPC_PROJECTS_PORT: "5005"
      DATABASE_PROJECTS_HOST: "db"
      DATABASE_PROJECTS_PORT: "5432"
      DATABASE_PROJECTS_USER: "root"
      DATABASE_PROJECTS_PASSWORD: "root"
      DATABASE_PROJECTS_DATABASE: "woorkroom-projects"
    ports:
      - "5005:5005"
    command: ["npx", "nest", "start", "projects", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - woorkroom-net

volumes:
  postgres_data:
  minio_data:
  woorkroom-node_modules:

networks:
  woorkroom-net:
    driver: bridge
