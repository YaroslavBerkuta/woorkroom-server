services:
  db:
    image: postgres:16-alpine
    container_name: woorkroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - woorkroom-net

  mongo:
    image: mongo:7
    container_name: woorkroom-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - woorkroom-net

  redis:
    image: redis:7-alpine
    container_name: woorkroom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - woorkroom-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: woorkroom-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - woorkroom-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: woorkroom-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - woorkroom-net

  users:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-users
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      GRPC_USERS_PORT: ${GRPC_USERS_PORT}
      HEALTH_USERS_PORT: ${HEALTH_USERS_PORT:-6001}
    ports:
      - "${GRPC_USERS_PORT}:${GRPC_USERS_PORT}"
      - "${HEALTH_USERS_PORT:-6001}:${HEALTH_USERS_PORT:-6001}"
    command: ["npx", "nest", "start", "users", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - woorkroom-net

  companys:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-companys
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      GRPC_COMPANYS_PORT: ${GRPC_COMPANYS_PORT}
      HEALTH_COMPANYS_PORT: ${HEALTH_COMPANYS_PORT:-6002}
    ports:
      - "${GRPC_COMPANYS_PORT}:${GRPC_COMPANYS_PORT}"
      - "${HEALTH_COMPANYS_PORT:-6002}:${HEALTH_COMPANYS_PORT:-6002}"
    command: ["npx", "nest", "start", "companys", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - woorkroom-net

  authorization:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-authorization
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      GRPC_AUTH_PORT: ${GRPC_AUTH_PORT}
      GRPC_USERS_URL: ${GRPC_USERS_URL}
      GRPC_COMPANYS_URL: ${GRPC_COMPANYS_URL}
      HEALTH_AUTH_PORT: ${HEALTH_AUTH_PORT:-6003}
    ports:
      - "${GRPC_AUTH_PORT}:${GRPC_AUTH_PORT}"
      - "${HEALTH_AUTH_PORT:-6003}:${HEALTH_AUTH_PORT:-6003}"
    command: ["npx", "nest", "start", "authorization", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
      - redis
      - users
      - companys
    networks:
      - woorkroom-net

  activity:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-activity
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      GRPC_ACTIVITY_PORT: ${GRPC_ACTIVITY_PORT}
      MONGODB_ACTIVITY_URI: mongodb://woorkroom-mongo:27017/woorkroom_activity
      HEALTH_ACTIVITY_PORT: ${HEALTH_ACTIVITY_PORT:-6005}
    ports:
      - "${GRPC_ACTIVITY_PORT}:${GRPC_ACTIVITY_PORT}"
      - "${HEALTH_ACTIVITY_PORT:-6005}:${HEALTH_ACTIVITY_PORT:-6005}"
    command: ["npx", "nest", "start", "activity", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - rabbitmq
      - mongo
    networks:
      - woorkroom-net

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT}:${PORT}"
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      GRPC_USERS_URL: ${GRPC_USERS_URL}
      GRPC_AUTH_URL: ${GRPC_AUTH_URL}
      GRPC_COMPANYS_URL: ${GRPC_COMPANYS_URL}
      GRPC_MEDIA_URL: ${GRPC_MEDIA_URL}
      GRPC_PROJECTS_URL: ${GRPC_PROJECTS_URL}
      GRPC_ACTIVITY_URL: ${GRPC_ACTIVITY_URL}
      MEDIA_INTERNAL_URL: http://media:3001
    command: ["npx", "nest", "start", "gateway", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - users
      - authorization
      - companys
      - projects
      - activity
    networks:
      - woorkroom-net

  mails:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-mails
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      MONGODB_MAILS_URI: mongodb://woorkroom-mongo:27017/woorkroom_mails
      HEALTH_MAILS_PORT: ${HEALTH_MAILS_PORT:-6007}
    ports:
      - "${HEALTH_MAILS_PORT:-6007}:${HEALTH_MAILS_PORT:-6007}"
    command: ["npx", "nest", "start", "mails", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - rabbitmq
      - mailpit
      - mongo
    networks:
      - woorkroom-net

  minio:
    image: minio/minio:latest
    container_name: woorkroom-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - woorkroom-net

  media:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-media
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      GRPC_MEDIA_PORT: ${GRPC_MEDIA_PORT}
      MEDIA_HTTP_PORT: ${MEDIA_HTTP_PORT}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MEDIA_FILE_BASE_URL: ${MEDIA_FILE_BASE_URL:-http://localhost:3001/media/file}
    ports:
      - "${MEDIA_HTTP_PORT}:${MEDIA_HTTP_PORT}"
      - "${GRPC_MEDIA_PORT}:${GRPC_MEDIA_PORT}"
    command: ["npx", "nest", "start", "media", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - minio
    networks:
      - woorkroom-net

  projects:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: woorkroom-projects
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL}
      GRPC_PROJECTS_PORT: ${GRPC_PROJECTS_PORT}
      DATABASE_PROJECTS_HOST: ${DATABASE_PROJECTS_HOST}
      DATABASE_PROJECTS_PORT: ${DATABASE_PROJECTS_PORT}
      DATABASE_PROJECTS_USER: ${DATABASE_PROJECTS_USER}
      DATABASE_PROJECTS_PASSWORD: ${DATABASE_PROJECTS_PASSWORD}
      DATABASE_PROJECTS_DATABASE: ${DATABASE_PROJECTS_DATABASE}
      MONGODB_PROJECTS_URI: mongodb://woorkroom-mongo:27017/woorkroom_projects
      HEALTH_PROJECTS_PORT: ${HEALTH_PROJECTS_PORT:-6004}
    ports:
      - "${GRPC_PROJECTS_PORT}:${GRPC_PROJECTS_PORT}"
      - "${HEALTH_PROJECTS_PORT:-6004}:${HEALTH_PROJECTS_PORT:-6004}"
    command: ["npx", "nest", "start", "projects", "--watch"]
    volumes:
      - ./:/app
      - woorkroom-node_modules:/app/node_modules
    depends_on:
      - db
      - mongo
    networks:
      - woorkroom-net

volumes:
  postgres_data:
  minio_data:
  mongo_data:
  woorkroom-node_modules:

networks:
  woorkroom-net:
    driver: bridge
