name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 109039361194.dkr.ecr.eu-north-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push changed images
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "ALL")
          echo "Changed files: $CHANGED"

          # Якщо змінились shared libs, proto або залежності — ребілдимо все
          REBUILD_ALL=false
          if [ "$CHANGED" = "ALL" ] || echo "$CHANGED" | grep -qE "^(libs/|proto/|package.*\.json)"; then
            REBUILD_ALL=true
            echo "Shared code changed — rebuilding all services"
          fi

          for service in users companys authorization projects activity audit mails media gateway; do
            SHOULD_BUILD=$REBUILD_ALL

            if echo "$CHANGED" | grep -qE "^(apps/$service/|docker/Dockerfile\.$service)"; then
              SHOULD_BUILD=true
            fi

            if [ "$SHOULD_BUILD" = "true" ]; then
              echo "=== Building $service ==="
              docker build -f docker/Dockerfile.$service \
                -t $ECR_REGISTRY/woorkroom/$service:latest \
                -t $ECR_REGISTRY/woorkroom/$service:${{ github.sha }} \
                .
              docker push $ECR_REGISTRY/woorkroom/$service:latest
              docker push $ECR_REGISTRY/woorkroom/$service:${{ github.sha }}
            else
              echo "=== Skipping $service (no changes) ==="
            fi
          done

      - name: Get ECR login password for EC2
        id: ecr-password
        run: |
          echo "password=$(aws ecr get-login-password --region $AWS_REGION)" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          ECR_PASSWORD: ${{ steps.ecr-password.outputs.password }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_PASSWORD,ECR_REGISTRY
          script: |
            echo "$ECR_PASSWORD" | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            cd ~/woorkroom-server
            git pull origin main
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sudo docker image prune -f
