name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild all services'
        type: boolean
        default: false

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 109039361194.dkr.ecr.eu-north-1.amazonaws.com

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          ALL='["users","companys","authorization","projects","activity","audit","mails","media","gateway"]'
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          # Rebuild everything if shared code changed or forced
          if [ -z "$CHANGED" ] \
            || [ "${{ inputs.rebuild_all }}" = "true" ] \
            || echo "$CHANGED" | grep -qE "^(libs/|proto/|package.*\.json)"; then
            echo "Rebuilding all services"
            echo "services=$ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Otherwise detect per-service changes
          SERVICES=$(python3 -c "
          import json, sys
          changed = '''$CHANGED'''.splitlines()
          all_services = ['users','companys','authorization','projects','activity','audit','mails','media','gateway']
          result = []
          for s in all_services:
              if any(f.startswith(f'apps/{s}/') or f == f'docker/Dockerfile.{s}' for f in changed):
                  result.append(s)
          print(json.dumps(result))
          ")
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  build:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/woorkroom/${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/woorkroom/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR login password
        id: ecr-password
        run: echo "password=$(aws ecr get-login-password --region $AWS_REGION)" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          ECR_PASSWORD: ${{ steps.ecr-password.outputs.password }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_PASSWORD,ECR_REGISTRY
          script: |
            echo "$ECR_PASSWORD" | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            cd ~/woorkroom-server
            git pull origin main
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sudo docker image prune -f
